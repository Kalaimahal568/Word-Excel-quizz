
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .quiz-wrap { padding: 1rem 0; }
  .screen { display: none; }
  .screen.active { display: block; }
  h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; }
  p { font-size: 15px; color: var(--color-text-secondary); line-height: 1.6; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  input[type="text"] { width: 100%; padding: 10px 14px; font-size: 15px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); margin-top: 6px; }
  input[type="text"]:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 2px rgba(24,95,165,0.15); }
  .btn { display: inline-block; padding: 10px 22px; font-size: 14px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .btn-primary:hover { background: #0C447C; border-color: #0C447C; }
  .btn-success { background: #3B6D11; color: #fff; border-color: #3B6D11; }
  .btn-success:hover { background: #27500A; }
  .section-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: var(--border-radius-md); margin-bottom: 10px; }
  .badge-word { background: #E6F1FB; color: #0C447C; }
  .badge-excel { background: #EAF3DE; color: #27500A; }
  .progress-bar-wrap { background: var(--color-background-secondary); border-radius: 99px; height: 6px; margin-bottom: 1.5rem; }
  .progress-bar { background: #185FA5; height: 6px; border-radius: 99px; transition: width 0.3s; }
  .q-num { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 6px; }
  .q-text { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 14px; line-height: 1.5; }
  .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .option:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .option.selected { border-color: #185FA5; background: #E6F1FB; }
  .option.correct { border-color: #3B6D11; background: #EAF3DE; }
  .option.wrong { border-color: #A32D2D; background: #FCEBEB; }
  .option-key { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); min-width: 18px; }
  .option-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.5; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center; }
  .metric-val { font-size: 26px; font-weight: 500; color: var(--color-text-primary); }
  .metric-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .result-row { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .dot-ok { background: #639922; }
  .dot-no { background: #E24B4A; }
  table.lb { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.lb th { text-align: left; padding: 8px 10px; font-weight: 500; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); }
  table.lb td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-pass { background: #EAF3DE; color: #27500A; }
  .tag-fail { background: #FCEBEB; color: #791F1F; }
  .pass-wrap { position: relative; display: flex; align-items: center; margin-top: 6px; margin-bottom: 10px; }
  .pass-wrap input { width: 100%; padding: 10px 40px 10px 14px; font-size: 15px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); }
  .pass-wrap input:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 2px rgba(24,95,165,0.15); }
  .eye-btn { position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; padding: 4px; line-height: 1; }
  .eye-btn:hover { color: var(--color-text-primary); }
</style>

<div class="quiz-wrap">

<div class="screen active" id="s-join">
  <div style="text-align:center; padding: 2rem 0 1rem;">
    <div style="font-size: 13px; font-weight:500; letter-spacing:0.5px; color:var(--color-text-secondary); margin-bottom:8px;">INTERACTIVE EXAM</div>
    <h1 style="font-size:24px; margin-bottom:6px;">MS Word & MS Excel Quiz</h1>
    <p style="max-width:420px; margin:0 auto 2rem;">40 questions · Two sections · Instant feedback</p>
  </div>
  <div class="card" style="max-width:420px; margin:0 auto;">
    <label style="font-size:14px; font-weight:500; color:var(--color-text-primary);">Your full name</label>
    <input type="text" id="studentName" placeholder="e.g. Arun Kumar" />
    <label style="font-size:14px; font-weight:500; color:var(--color-text-primary); margin-top:12px; display:block;">Student ID / Roll number</label>
    <input type="text" id="studentId" placeholder="e.g. 2024CS001" />
    <div style="margin-top:16px; text-align:right;">
      <button class="btn btn-primary" onclick="startQuiz()">Start exam ↗</button>
    </div>
  </div>
  <div style="max-width:420px; margin: 1rem auto 0; text-align:center;">
    <button class="btn" style="font-size:13px;" onclick="showLecturer()">Lecturer view →</button>
  </div>
</div>

<div class="screen" id="s-quiz">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <span id="sectionLabel" class="section-badge badge-word">Section 1 — MS Word</span>
    <span style="font-size:13px; color:var(--color-text-secondary);">Q <span id="qIdx">1</span> / 40</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:2.5%"></div></div>
  <div class="card">
    <div class="q-num" id="qNum">Question 1</div>
    <div class="q-text" id="qText"></div>
    <div id="options"></div>
  </div>
  <div class="nav-row">
    <span style="font-size:13px;" id="ansStatus"></span>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
  </div>
</div>

<div class="screen" id="s-result">
  <h2>Your results</h2>
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="rScore">-</div><div class="metric-lbl">Score / 40</div></div>
    <div class="metric"><div class="metric-val" id="rPct">-</div><div class="metric-lbl">Percentage</div></div>
    <div class="metric"><div class="metric-val" id="rGrade">-</div><div class="metric-lbl">Grade</div></div>
  </div>
  <div class="card">
    <div style="display:flex; gap:16px; margin-bottom:12px; font-size:13px; color:var(--color-text-secondary);">
      <span>Word: <strong id="rWord">-</strong>/20</span>
      <span>Excel: <strong id="rExcel">-</strong>/20</span>
    </div>
    <div id="reviewList"></div>
  </div>
  <div style="margin-top:1rem; display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn" onclick="retake()">Retake quiz</button>
    <button class="btn btn-primary" onclick="showLecturer()">View lecturer panel</button>
  </div>
</div>

<div class="screen" id="s-lecturer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <h2 style="margin:0;">Lecturer panel</h2>
    <button class="btn" onclick="goHome()">← Back</button>
  </div>
  <div id="lecturerInner">
    <div class="card" style="max-width:360px;">
      <label style="font-size:14px; font-weight:500; color:var(--color-text-primary);">Lecturer passcode</label>
      <div class="pass-wrap">
        <input type="password" id="passcodeInput" placeholder="Enter passcode" />
        <button class="eye-btn" onclick="toggleEye()" id="eyeBtn" title="Show/hide">&#128065;</button>
      </div>
      <button class="btn btn-primary" onclick="checkPass()">Access panel</button>
    </div>
  </div>
</div>

</div>

<script>
const PASSCODE = "lecturer123";

const questions = [
  {s:"word", q:"வேர்ட் பிராசஸிங் (Word processing) என்பதன் முதன்மை வரையறை என்ன?", opts:["விரிதாள்கள் மற்றும் வரைபடங்களை உருவாக்குதல்","உரை ஆவணங்களை உருவாக்குதல், திருத்துதல், வடிவமைத்தல், சேமித்தல் மற்றும் அச்சிடுதல்","மின்னஞ்சல் மற்றும் தொடர்புகளை நிர்வகித்தல்","வலைத்தளங்களை வடிவமைத்தல்"], ans:1},
  {s:"word", q:"கடைசியாகச் செய்த செயலை ரத்து செய்ய (Undo) எந்த விசைப்பலகை குறுக்குவழி பயன்படுத்தப்படுகிறது?", opts:["Ctrl + Y","Ctrl + X","Ctrl + Z","Ctrl + S"], ans:2},
  {s:"word", q:"சுட்டியைப் (Mouse) பயன்படுத்தி ஒரு முழுப் பத்தியையும் விரைவாகத் தேர்ந்தெடுக்க நீங்கள் என்ன செய்ய வேண்டும்?", opts:["ஒரு முறை கிளிக் செய்ய வேண்டும்","முதல் வார்த்தையை இருமுறை கிளிக் செய்ய வேண்டும்","பத்தியில் எங்கேனும் மூன்று முறை கிளிக் (Triple-click) செய்ய வேண்டும்","வலது கிளிக் செய்து 'All' என்பதைத் தேர்ந்தெடுக்க வேண்டும்"], ans:2},
  {s:"word", q:"விசைப்பலகையில் உள்ள 'Delete' விசையின் சரியான செயல் என்ன?", opts:["கர்சருக்கு இடதுபுறம் உள்ள எழுத்தை நீக்கும்","கர்சருக்கு வலதுபுறம் உள்ள எழுத்தை நீக்கும்","முழு வரியையும் நீக்கும்","முழு ஆவணத்தையும் நீக்கும்"], ans:1},
  {s:"word", q:"ஓரங்கள் (Margins), பக்கத் திசை (Orientation) மற்றும் நெடுவரிசைகள் (Columns) ஆகிய கருவிகள் எந்த ரிப்பன் டேப்பில் உள்ளன?", opts:["Home","Insert","Layout","Review"], ans:2},
  {s:"word", q:"தானியங்கி பொருளடக்கத்தை (Table of Contents) உருவாக்க மிக முக்கியமான தேவை என்ன?", opts:["அனைத்து தலைப்புகளையும் அடிக்கோடிட வேண்டும்","உள்ளமைக்கப்பட்ட தலைப்பு ஸ்டைல்களை (Heading 1, 2, or 3) பயன்படுத்த வேண்டும்","பக்க எண்களை கைமுறையாக தட்டச்சு செய்ய வேண்டும்","முழு ஆவணத்திற்கும் ஒரு குறிப்பிட்ட எழுத்துருவைப் பயன்படுத்த வேண்டும்"], ans:1},
  {s:"word", q:"மெயில் மெர்ஜ் (Mail Merge) முறையில், பெறுநர்களின் பட்டியலைக் கொண்ட கோப்பு எவ்வாறு அழைக்கப்படுகிறது?", opts:["Main Document","Placeholder","Data Source","Merge Field"], ans:2},
  {s:"word", q:"ஒரு மதிப்பாய்வாளர் செய்யும் ஒவ்வொரு மாற்றத்தையும் பதிவு செய்ய எந்தக் கருவியைப் பயன்படுத்த வேண்டும்?", opts:["Comments","Track Changes","Spell Check","Find and Replace"], ans:1},
  {s:"word", q:"வெவ்வேறு ஓரங்கள் அல்லது பக்கத் திசைகளை அனுமதிக்க, அடுத்த பக்கத்தில் ஒரு புதிய பகுதியைத் தொடங்க எதனைப் பயன்படுத்த வேண்டும்?", opts:["Column Break","Section Break (Next Page)","Simple Page Break","Continuous Break"], ans:1},
  {s:"word", q:"நவீன மைக்ரோசாப்ட் வேர்ட் ஆவணங்களின் இயல்புநிலை (Default) கோப்பு வடிவம் என்ன?", opts:[".txt",".pdf",".docx",".rtf"], ans:2},
  {s:"word", q:"பிரிவு முறிவுகள் (Section Breaks) போன்ற மறைக்கப்பட்ட குறியீடுகளைப் பார்க்க எந்த பொத்தானைப் பயன்படுத்த வேண்டும்?", opts:["Bold (B)","Show/Hide ¶ (Ctrl+*)","இதழ் (Italic)","எழுத்துரு அளவு (Font Size)"], ans:1},
  {s:"word", q:"வெவ்வேறு வேர்ட் பிராசஸிங் மென்பொருள்களுக்கு இடையே கோப்புகளைப் பகிர எந்த வடிவம் சிறந்தது?", opts:[".docx",".pdf",".txt",".rtf (Rich Text Format)"], ans:3},
  {s:"word", q:"முதல் பக்கத்தில் மட்டும் வேறு தலைப்பை (Header) வைக்க எந்த விருப்பத்தைத் தேர்ந்தெடுக்க வேண்டும்?", opts:["Same as Previous","Different First Page","First Page Only","Odd & Even Pages"], ans:1},
  {s:"word", q:"ஆவணத்தில் ஒரு வார்த்தை இருக்கும் இடங்களிலெல்லாம் அதை உடனடியாக மாற்ற எந்தக் கருவி உதவுகிறது?", opts:["Find (Ctrl+F)","Find & Replace (Ctrl+H)","Spell Check (F7)","Thesaurus"], ans:1},
  {s:"word", q:"ஒரு வேர்ட் அட்டவணையில் அடுத்த செல்லிற்கு (Cell) நகர எதனைப் பயன்படுத்த வேண்டும்?", opts:["Enter","Tab","Shift","Spacebar"], ans:1},
  {s:"word", q:"உரையை அடுத்த நெடுவரிசையின் (Column) உச்சிக்கு கொண்டு செல்ல எதனைப் பயன்படுத்த வேண்டும்?", opts:["Page Break","Column Break","Section Break","Line Break"], ans:1},
  {s:"word", q:"ஆவணத்தின் பின்புலத்தில் மங்கலாகத் தெரியும் 'CONFIDENTIAL' போன்ற உரை எவ்வாறு அழைக்கப்படுகிறது?", opts:["Header","Border","Watermark","Footer"], ans:2},
  {s:"word", q:"கர்சரை ஒரு நேரத்தில் ஒரு முழு வார்த்தையாக நகர்த்த எந்த குறுக்குவழியைப் பயன்படுத்தலாம்?", opts:["Ctrl + S","Ctrl + ← / →","Ctrl + Home","Shift + Tab"], ans:1},
  {s:"word", q:"எழுத்துரு அளவை (Font Size) அதிகரிக்கப் பயன்படும் குறுக்குவழி எது?", opts:["Ctrl + [","Ctrl + ]","Ctrl + A","Ctrl + N"], ans:1},
  {s:"word", q:"இங்கிலாந்து, ஆசியா மற்றும் ஆப்பிரிக்காவில் தரநிலையாகப் பயன்படுத்தப்படும் காகித அளவு எது?", opts:["Letter","Legal","A4","A3"], ans:2},
  {s:"excel", q:"எக்செல்-இல் ஒவ்வொரு சூத்திரமும் (Formula) எந்தக் குறியீட்டுடன் தொடங்க வேண்டும்?", opts:["#","+","= (Equals sign)","@"], ans:2},
  {s:"excel", q:"மேல் இடது மூலையில் உள்ள 'Name Box'-ன் நோக்கம் என்ன?", opts:["இது முழு கோப்பிற்கும் பெயரிடுகிறது","தற்போது தேர்ந்தெடுக்கப்பட்ட செல்லின் முகவரியைக் காட்டுகிறது","விரிதாளில் உள்ள வார்த்தைகளை எண்ணுகிறது","உரையை தடிமனாக மாற்றுகிறது"], ans:1},
  {s:"excel", q:"ஒரு வடிவத்தை (எ.கா. 1, 2, 3...) மூலையை இழுப்பதன் மூலம் விரைவாக நிரப்ப அனுமதிக்கும் எக்செல் அம்சம் எது?", opts:["Pattern Maker","Fill Handle","AutoSum","VLOOKUP"], ans:1},
  {s:"excel", q:"=SUM(B2:B5) என்ற சூத்திரத்தில், கோலன் (:) குறியீடு எதைக் குறிக்கிறது?", opts:["வகுத்தல்","கழித்தல்","'இது முதல் இது வரை' (Range)","செல் B2 மற்றும் செல் B5 மட்டும்"], ans:2},

let currentQ = 0, answers = [], studentName = "", studentId = "";
let submissions = [];
try { submissions = JSON.parse(localStorage.getItem("quizSubmissions") || "[]"); } catch(e){}

function saveSubmissions() { try { localStorage.setItem("quizSubmissions", JSON.stringify(submissions)); } catch(e){} }

function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function startQuiz() {
  studentName = document.getElementById('studentName').value.trim();
  studentId = document.getElementById('studentId').value.trim();
  if (!studentName || !studentId) { alert("Please enter your name and student ID."); return; }
  currentQ = 0; answers = [];
  show('s-quiz'); renderQ();
}

function renderQ() {
  const q = questions[currentQ];
  const keys = ['A','B','C','D'];
  document.getElementById('qIdx').textContent = currentQ + 1;
  document.getElementById('qNum').textContent = 'Question ' + (currentQ + 1);
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = ((currentQ+1)/40*100).toFixed(0) + '%';
  const badge = document.getElementById('sectionLabel');
  if (q.s === 'word') { badge.textContent = 'Section 1 — MS Word'; badge.className = 'section-badge badge-word'; }
  else { badge.textContent = 'Section 2 — MS Excel'; badge.className = 'section-badge badge-excel'; }
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = '<span class="option-key">' + keys[i] + '</span><span class="option-text">' + o + '</span>';
    div.onclick = () => selectOpt(i);
    opts.appendChild(div);
  });
  document.getElementById('ansStatus').textContent = '';
  document.getElementById('nextBtn').disabled = true;
}

function selectOpt(idx) {
  const q = questions[currentQ];
  const opts = document.getElementById('options').children;
  for (let o of opts) o.classList.remove('selected','correct','wrong');
  opts[idx].classList.add('selected');
  answers[currentQ] = idx;
  setTimeout(() => {
    opts[idx].classList.remove('selected');
    opts[idx].classList.add(idx === q.ans ? 'correct' : 'wrong');
    opts[q.ans].classList.add('correct');
    const st = document.getElementById('ansStatus');
    st.textContent = idx === q.ans ? '✓ Correct' : '✗ Incorrect';
    st.style.color = idx === q.ans ? '#3B6D11' : '#A32D2D';
    document.getElementById('nextBtn').disabled = false;
  }, 300);
}

function nextQ() {
  if (answers[currentQ] === undefined) { alert("Please select an answer."); return; }
  currentQ++;
  if (currentQ >= questions.length) { finishQuiz(); return; }
  renderQ();
}

function finishQuiz() {
  let wordScore = 0, excelScore = 0;
  questions.forEach((q, i) => { if (answers[i] === q.ans) { q.s === 'word' ? wordScore++ : excelScore++; } });
  const total = wordScore + excelScore;
  const pct = Math.round(total / 40 * 100);
  const grade = pct >= 80 ? 'A' : pct >= 65 ? 'B' : pct >= 50 ? 'C' : pct >= 40 ? 'D' : 'F';
  const entry = { name: studentName, id: studentId, word: wordScore, excel: excelScore, total, pct, grade, time: new Date().toLocaleString() };
  submissions.push(entry); saveSubmissions();
  document.getElementById('rScore').textContent = total;
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rGrade').textContent = grade;
  document.getElementById('rWord').textContent = wordScore;
  document.getElementById('rExcel').textContent = excelScore;
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  questions.forEach((q, i) => {
    const correct = answers[i] === q.ans;
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = '<div class="dot ' + (correct?'dot-ok':'dot-no') + '"></div><div style="flex:1"><span style="font-weight:500;">Q'+(i+1)+':</span> '+q.q.substring(0,60)+'...<br><span style="color:var(--color-text-secondary);">Your: '+q.opts[answers[i]]+(correct?'':' | Correct: '+q.opts[q.ans])+'</span></div>';
    list.appendChild(row);
  });
  show('s-result');
}

function retake() { show('s-join'); }
function showLecturer() { show('s-lecturer'); }
function goHome() { show('s-join'); }

function toggleEye() {
  const inp = document.getElementById('passcodeInput');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '&#128064;'; }
  else { inp.type = 'password'; btn.innerHTML = '&#128065;'; }
}

function checkPass() {
  const val = document.getElementById('passcodeInput').value;
  if (val !== PASSCODE) { alert("Incorrect passcode."); return; }
  renderLecturer();
}

function renderLecturer() {
  const inner = document.getElementById('lecturerInner');
  if (submissions.length === 0) {
    inner.innerHTML = '<p style="color:var(--color-text-secondary);">No submissions yet. Students need to complete the quiz first.</p>';
    return;
  }
  const avg = Math.round(submissions.reduce((a,s)=>a+s.total,0)/submissions.length);
  const pass = submissions.filter(s=>s.pct>=50).length;
  inner.innerHTML = `
    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric"><div class="metric-val">${submissions.length}</div><div class="metric-lbl">Students</div></div>
      <div class="metric"><div class="metric-val">${avg}/40</div><div class="metric-lbl">Avg score</div></div>
      <div class="metric"><div class="metric-val">${Math.round(pass/submissions.length*100)}%</div><div class="metric-lbl">Pass rate</div></div>
    </div>
    <div class="card" style="overflow-x:auto;">
      <table class="lb">
        <thead><tr><th>#</th><th>Name</th><th>ID</th><th>Word /20</th><th>Excel /20</th><th>Total /40</th><th>%</th><th>Grade</th><th>Status</th><th>Time</th></tr></thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
    <div style="margin-top:1rem; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-success" onclick="exportCSV()">Export to Excel (CSV) ↓</button>
      <button class="btn" style="color:#A32D2D; border-color:#A32D2D;" onclick="clearData()">Clear all data</button>
    </div>`;
  const tbody = document.getElementById('lbBody');
  submissions.forEach((s, i) => {
    const p = s.pct >= 50;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td><td>${s.name}</td><td>${s.id}</td><td>${s.word}</td><td>${s.excel}</td><td><strong>${s.total}</strong></td><td>${s.pct}%</td><td><strong>${s.grade}</strong></td><td><span class="tag ${p?'tag-pass':'tag-fail'}">${p?'Pass':'Fail'}</span></td><td style="font-size:12px;color:var(--color-text-secondary);">${s.time}</td>`;
    tbody.appendChild(tr);
  });
}

function exportCSV() {
  const headers = ['No','Name','Student ID','MS Word (/20)','MS Excel (/20)','Total (/40)','Percentage','Grade','Status','Submitted At'];
  const rows = submissions.map((s,i) => [i+1,s.name,s.id,s.word,s.excel,s.total,s.pct+'%',s.grade,s.pct>=50?'Pass':'Fail',s.time]);
  const csv = [headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='quiz_results.csv'; a.click();
  URL.revokeObjectURL(url);
}

function clearData() {
  if (confirm('Clear all student submissions?')) { submissions=[]; saveSubmissions(); renderLecturer(); }
}
</script>
